name: mfaaa
description: "A minimalist alarm clock UI built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1
  
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dotted_border: ^2.1.0
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  app_usage: ^4.1.0
  android_intent_plus: ^6.0.0
  vibration: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/Logo.png"
  adaptive_icon_background: "#A8E61D"
  adaptive_icon_foreground: "assets/icon/adaptive_foreground.png"
  adaptive_icon_monochrome: "assets/icon/adaptive_monochrome.png"

flutter:
  uses-material-design: true
  assets:
    - assets/1784034034146_afbm86.mp3
  fonts:
    - family: Digital
      fonts:
        - asset: assets/fonts/DS-DIGI.TTF
