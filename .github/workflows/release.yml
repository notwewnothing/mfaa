# Builds release APKs + AAB and publishes them as a GitHub Release.
#
# Trigger a release by pushing a tag:   git tag v1.0.0 && git push origin v1.0.0
# (workflow_dispatch builds too, but only uploads artifacts — no release.)
#
# Release signing needs these repository secrets (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of the keystore: base64 -w0 upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD keystore (store) password
#   ANDROID_KEY_ALIAS         key alias, e.g. upload
#   ANDROID_KEY_PASSWORD      key password
# Create the keystore once with:
#   keytool -genkey -v -keystore upload-keystore.jks -keyalg RSA -keysize 2048 \
#     -validity 10000 -alias upload
# Without the secrets the build still succeeds, signed with debug keys
# (installable, but not suitable for Play Store and updates won't install
# over differently-signed builds).

name: Android Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      # Only the deterministic logic suites gate a release. Goldens are
      # machine/wall-clock dependent, and widget_test / _layout_probe* /
      # session_store_test have known failures on master (see repo issues) —
      # re-add them here once they're green locally.
      - name: Test (deterministic logic suites)
        run: flutter test test/alarm_logic_test.dart test/device_usage_test.dart

      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(sed -n 's/^version: *\([^+ ]*\).*/\1/p' pubspec.yaml)-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (build number ${GITHUB_RUN_NUMBER})"

      - name: Set up release keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          # java.util.Properties treats backslash as an escape character; double
          # them so backslash-containing passwords survive Properties.load().
          esc() { printf '%s' "$1" | sed 's/\\/\\\\/g'; }
          {
            printf 'storeFile=upload-keystore.jks\n'
            printf 'storePassword=%s\n' "$(esc "$KEYSTORE_PASSWORD")"
            printf 'keyAlias=%s\n'      "$(esc "$KEY_ALIAS")"
            printf 'keyPassword=%s\n'   "$(esc "$KEY_PASSWORD")"
          } > android/key.properties

      - name: Warn about debug signing
        if: env.HAS_KEYSTORE != 'true'
        run: echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — artifacts are signed with debug keys."

      - name: Build universal APK
        run: flutter build apk --release --build-name="${{ steps.version.outputs.version }}" --build-number="${{ github.run_number }}"

      - name: Build per-ABI APKs
        run: flutter build apk --release --split-per-abi --build-name="${{ steps.version.outputs.version }}" --build-number="${{ github.run_number }}"

      - name: Build app bundle (AAB)
        run: flutter build appbundle --release --build-name="${{ steps.version.outputs.version }}" --build-number="${{ github.run_number }}"

      - name: Collect artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk           "dist/mfaaa-$VERSION-universal.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/mfaaa-$VERSION-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/mfaaa-$VERSION-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk    "dist/mfaaa-$VERSION-x86_64.apk"
          cp build/app/outputs/bundle/release/app-release.aab        "dist/mfaaa-$VERSION.aab"
          ls -lh dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mfaaa-${{ steps.version.outputs.version }}
          path: dist/*
          overwrite: true

      - name: Create GitHub Release
        # Push-only: a manual dispatch on an existing tag must not silently
        # replace that release's published assets.
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Which APK do I download?

            | File | Compatible phones |
            | --- | --- |
            | `mfaaa-<version>-universal.apk` | Any Android phone — safest pick if you're unsure |
            | `mfaaa-<version>-arm64-v8a.apk` | Most phones from 2017 onward (64-bit ARM) — recommended |
            | `mfaaa-<version>-armeabi-v7a.apk` | Older or budget phones (32-bit ARM) |
            | `mfaaa-<version>-x86_64.apk` | Intel/AMD Android devices — rare, mostly emulators |
            | `mfaaa-<version>.aab` | Play Store upload format only — not for direct install |

            # IMPORTANT NOTES BEFORE YOU INSTALL

            For this app to work properly, you must grant the following permissions:

            | Permission | Prompted at | Purpose |
            | --- | --- | --- |
            | Usage Access | First app launch | Powers screen-time stats, focus/distracted time tracking, and the focus score |
            | Display over other apps | When you enable App Blocking | Required for the app-blocking overlay to work. Some phone manufacturers restrict this by default — if the toggle won't stick, check your device's manufacturer-specific settings (e.g. autostart/permission manager) first |
